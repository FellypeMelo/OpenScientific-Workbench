name: OSW Core CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -e . --group dev

      - name: Run backend tests with coverage
        run: |
          cd backend
          pytest --cov=src --cov-report=term-missing --cov-fail-under=80

  # RF-005/RNF-001/RNF-002: real sandboxed-execution smoke test against actual
  # escape payloads. Separate from `backend-test` above (which does NOT
  # install bubblewrap, so `BubblewrapSandboxDriver(runtime="bubblewrap")`
  # would fail loud there by design -- see its module docstring) --
  # `tests/integration/test_bubblewrap_sandbox_escape.py` self-skips
  # everywhere `bwrap` isn't on PATH, so this job is the only place it
  # actually executes.
  #
  # NOTE: written and reviewed carefully, but NOT executable/verifiable from
  # the Windows dev sandbox this phase was implemented in -- a human must
  # confirm this job goes green on a real `ubuntu-latest` GitHub Actions
  # runner. In particular, some recent Ubuntu images restrict unprivileged
  # user namespaces by default (AppArmor), which `bwrap` needs; the
  # `sysctl` step below is a best-effort attempt to relax that if present,
  # non-fatal if the knob doesn't exist on the runner's kernel.
  sandbox-escape-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Relax unprivileged user namespace restriction (best-effort)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -e . --group dev

      - name: Run real bubblewrap sandbox-escape smoke test
        run: |
          cd backend
          pytest tests/integration/test_bubblewrap_sandbox_escape.py -v

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # pnpm 11.5.0 (pinned below) requires Node >=22.13 -- it imports the
          # `node:sqlite` builtin at startup, which doesn't exist before that
          # version. Verified by an actual `docker build` under node:20-alpine
          # failing with `ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite` (see
          # frontend/Dockerfile's comment) -- this runner needs the same bump.
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "11.5.0"

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          pnpm exec vitest run --coverage

# MOVED -- this file's services (postgres/redis/neo4j/qdrant, hardcoded
# plaintext dev passwords, for local development against natively-run
# backend/frontend processes) have been folded into the repo root's
# `docker-compose.yml`, the one canonical Compose stack for this project now
# (see that file's header comment for the full rationale and service list).
#
# This file is intentionally left as a non-functional pointer (no
# `services:` key -- `docker compose -f docker-compose.dev.yml up` will now
# error, on purpose, rather than silently run a stale duplicate config) so
# anyone with old muscle-memory / scripts referencing this exact filename
# lands here and finds out where things went instead of a bare "no such
# file" error.
#
# What to run instead, for the same "just the infra, run backend/frontend
# natively" workflow this file used to provide:
#
#   docker compose up postgres redis neo4j qdrant
#
# (`docker compose up` with no service names starts everything, including
# backend/worker/frontend; naming only the four datastores above reproduces
# this file's old scope. `cp .env.example .env` first for working local
# defaults -- see the root `.env.example`.)

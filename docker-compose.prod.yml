# Production-shaped compose stack for OpenScientific-Workbench.
#
# Unlike `docker-compose.dev.yml` (infra-only, hardcoded plaintext dev
# passwords, for local development against natively-run backend/frontend
# processes), this file builds and runs the full stack -- postgres, redis,
# neo4j, qdrant, backend, frontend -- from the Dockerfiles in `backend/` and
# `frontend/`, and reads every secret from the environment / a `.env` file
# (see the root `.env.example` for the full list of variables this file
# expects). No credential in this file has an insecure baked-in default: every
# secret uses the `${VAR:?error message}` compose syntax, so `docker compose
# up` fails fast with a clear message instead of silently booting with a weak
# or empty password.
#
# This is still a single-host deployment shape, not the k8s MVP (`k8s/`) --
# see `k8s/README.md` for how the two relate and what the k8s manifests
# deliberately do NOT attempt yet (Ingress, HPA, PVCs, resource tuning, ...).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-osw_session_db}
      POSTGRES_USER: ${POSTGRES_USER:-osw_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osw_user} -d ${POSTGRES_DB:-osw_session_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in your .env file}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.1
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # NOT `curl -f ...` (used by `docker-compose.dev.yml`'s equivalent
      # healthcheck) -- verified via an actual `docker compose up` that the
      # `qdrant/qdrant:v1.9.1` image has no `curl` binary at all (it is a
      # Debian-bookworm-based image without it installed), which left that
      # healthcheck permanently failing. This bash-only TCP check (no
      # curl/wget/nc dependency) just confirms the HTTP port is accepting
      # connections, which is sufficient for this compose file's actual use
      # of the health status: gating `backend`'s `depends_on`.
      test: ["CMD-SHELL", "bash -c '(exec 3<>/dev/tcp/127.0.0.1/6333)' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in your .env file}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      # `redis-cli -a ...` in the healthcheck itself needs $REDIS_PASSWORD
      # inside the *container's* shell, not compose's own interpolation
      # (hence `$$`); expose it there via the container's environment.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in your .env file}
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-osw_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-osw_session_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_SSH_ROLE: ${VAULT_SSH_ROLE:-hpc-ssh-role}
      SLURM_SSH_HOST: ${SLURM_SSH_HOST:-}
      SLURM_SSH_USER: ${SLURM_SSH_USER:-}
      SLURM_SSH_KEY_PATH: ${SLURM_SSH_KEY_PATH:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your .env file (e.g. `openssl rand -hex 32`)}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-30}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are inlined into the client bundle at build time
        # (see frontend/Dockerfile's top comment) -- this must point at
        # wherever the *browser* can reach the backend from, not the
        # in-network service name `backend`.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  redis_data:

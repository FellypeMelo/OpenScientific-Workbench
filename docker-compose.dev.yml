version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: osw-postgres-dev
    environment:
      POSTGRES_DB: osw_session_db
      POSTGRES_USER: osw_user
      POSTGRES_PASSWORD: osw_password_secure_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osw_user -d osw_session_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.20-community
    container_name: osw-neo4j-dev
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt Protocol
    environment:
      NEO4J_AUTH: neo4j/neo4j_password_secure_123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_password_secure_123 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: osw-qdrant-dev
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: osw-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  redis_data:

# OpenScientific-Workbench -- canonical Docker Compose stack.
#
# ONE file for the whole single-local-server deployment (this project's
# locked architecture: one Linux box, Compose, no external cloud/cluster --
# see `docs/planning/` for the decision record). Supersedes the old
# `docker-compose.dev.yml` (infra-only, hardcoded dev creds) and
# `docker-compose.prod.yml` (full stack, required-secret creds) -- both now
# point here (see the comment at the top of each). Every setting below has a
# working local default, so:
#
#   cp .env.example .env
#   docker compose up --build
#
# ...boots the entire stack (Postgres, Redis, Neo4j, Qdrant, backend API,
# RQ worker, frontend) with no further edits required. The defaults are
# real-but-weak local-dev credentials -- fine for a single trusted local
# server, NOT fine to expose on a shared network without overriding them in
# `.env` first (see `.env.example`'s comments).
#
# Services:
# - postgres / redis / neo4j / qdrant: persistent named volumes + healthchecks.
# - backend: built from `backend/Dockerfile`; waits on all four datastores via
#   `depends_on: condition: service_healthy`; serves the FastAPI app.
# - worker: the SAME backend image, running `scripts/run_worker.py` instead
#   of uvicorn -- the local (non-Slurm) HPC job queue (`HPC_BACKEND=local`),
#   consuming the `"osw-jobs"` RQ queue (see
#   `backend/src/infrastructure/hpc/local_job_dispatcher.py`). Runs that
#   dedicated script rather than the bare `rq worker osw-jobs` CLI command so
#   its Redis connection is built from this same file's `REDIS_URL` (the
#   Compose service name `redis`), not RQ's own `localhost:6379` default --
#   see the script's module docstring for the full reasoning.
# - frontend: built from `frontend/Dockerfile`.
# - vault: HashiCorp Vault, gated behind the `advanced` Compose profile (NOT
#   started by a plain `docker compose up`) -- only needed for the optional,
#   dormant Slurm-SSH HPC path (`HPC_BACKEND=slurm`). Opt in with:
#     docker compose --profile advanced up -d vault
#   See `docker/vault-entrypoint.sh` for the first-boot-init /
#   every-boot-auto-unseal logic and its header comment for what real
#   credential material ends up in the `vault_creds` volume.

x-backend-env: &backend-env
  ENV: ${ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-osw_user}:${POSTGRES_PASSWORD:-osw_password_change_me}@postgres:5432/${POSTGRES_DB:-osw_session_db}
  REDIS_URL: redis://redis:6379/0
  RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
  RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password_change_me}
  QDRANT_HOST: qdrant
  QDRANT_PORT: 6333
  # HPC backend selection (Fase 5 - job queue abstraction). "local" (default)
  # runs jobs through the `worker` service above (Redis-backed RQ queue,
  # `LocalJobDispatcher`); "slurm" dispatches over SSH via the existing
  # `SlurmSSHDispatcher`/`VaultClient` code, for operators who do have a real
  # cluster (requires the `advanced` profile's `vault` service, or an
  # externally-reachable Vault, plus the SLURM_SSH_* vars below). Read by
  # `infrastructure/config.py::Settings.HPC_BACKEND` and selected in
  # `presentation/dependencies.py::get_hpc_dispatcher`.
  HPC_BACKEND: ${HPC_BACKEND:-local}
  # Sandboxed code execution runtime (replaces the earlier gVisor/runsc
  # design). "bubblewrap" shells out to the `bwrap` binary installed in
  # `backend/Dockerfile`, via `infrastructure/sandbox/bubblewrap_driver.py`
  # (must fail loudly, never silently run unsandboxed, per this project's
  # security rules).
  SANDBOX_RUNTIME: ${SANDBOX_RUNTIME:-bubblewrap}
  # Only relevant to the optional `advanced`-profile Slurm-SSH HPC path (see
  # the `vault` service below) -- irrelevant, and safely ignored, when
  # HPC_BACKEND=local and VAULT_TOKEN is left empty (VaultClient/SlurmSSHDispatcher
  # both fall back to deterministic mocks when unconfigured).
  VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
  VAULT_TOKEN: ${VAULT_TOKEN:-}
  VAULT_SSH_ROLE: ${VAULT_SSH_ROLE:-hpc-ssh-role}
  SLURM_SSH_HOST: ${SLURM_SSH_HOST:-}
  SLURM_SSH_USER: ${SLURM_SSH_USER:-}
  SLURM_SSH_KEY_PATH: ${SLURM_SSH_KEY_PATH:-}
  JWT_SECRET: ${JWT_SECRET:-change-me-local-dev-jwt-secret-please-rotate}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-30}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  GLM_API_KEY: ${GLM_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-osw_session_db}
      POSTGRES_USER: ${POSTGRES_USER:-osw_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-osw_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osw_user} -d ${POSTGRES_DB:-osw_session_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password_change_me}
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-neo4j_password_change_me} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # `qdrant/qdrant` has no `curl`/`wget` binary (Debian-bookworm-based
      # image without it installed) -- this bash-only TCP probe just confirms
      # the HTTP port is accepting connections, which is sufficient for
      # gating `backend`'s `depends_on`.
      test: ["CMD-SHELL", "bash -c '(exec 3<>/dev/tcp/127.0.0.1/6333)' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Data lake (see `backend/data_lake/MANIFEST.md`) -- bound read-only,
      # then bound read-only AGAIN into the bwrap jail at `/datalake` by
      # `BubblewrapSandboxDriver` (double-read-only, defense in depth: even a
      # container-escape from the sandbox can't write here). Empty by
      # default; operators run `backend/scripts/fetch_data_lake.py` to
      # populate it.
      - ./data_lake:/datalake:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # HEALTHCHECK is inherited from `backend/Dockerfile` (hits `/health`).
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # See the file header + `backend/scripts/run_worker.py`'s module
    # docstring for why this is a dedicated script rather than the bare
    # `rq worker osw-jobs` CLI command.
    command: ["python", "scripts/run_worker.py"]
    environment: *backend-env
    volumes:
      - ./data_lake:/datalake:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # The image's inherited HEALTHCHECK probes `http://127.0.0.1:8000/health`
    # (the uvicorn API), which this container never serves -- disable it
    # rather than have Compose report a permanently "unhealthy" worker.
    healthcheck:
      disable: true
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are inlined into the client bundle at build time
        # (see `frontend/Dockerfile`'s top comment) -- this must point at
        # wherever the *browser* can reach the backend from, not the
        # in-network service name `backend`.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Optional: HashiCorp Vault. NOT started by a plain `docker compose up`.
  # Only matters for the dormant Slurm-SSH HPC path -- opt in explicitly:
  #   docker compose --profile advanced up -d vault
  vault:
    image: hashicorp/vault:1.17
    profiles: ["advanced"]
    volumes:
      - vault_data:/vault/data
      - vault_creds:/vault/creds
      - ./docker/vault-config.hcl:/vault/config/vault-config.hcl:ro
      - ./docker/vault-entrypoint.sh:/vault-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/vault-entrypoint.sh"]
    ports:
      - "${VAULT_PORT:-8200}:8200"
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  redis_data:
  vault_data:
  vault_creds:

# MVP Deployment for the OSW Next.js frontend (see k8s/README.md for the full
# scope boundary -- no resource requests/limits, HPA, or PodDisruptionBudget
# yet; those are explicitly deferred future work, not oversights).
#
# IMPORTANT -- `NEXT_PUBLIC_API_URL` is NOT set here as a runtime env var on
# purpose: Next.js inlines `NEXT_PUBLIC_*` variables into the client JS bundle
# at BUILD time (see `frontend/Dockerfile`'s top comment and
# `frontend/src/lib/api-client.ts`'s `getApiBaseUrl()`). Setting it as a pod
# env var here would have zero effect on the already-built image. The image
# referenced below MUST already have been built with
# `--build-arg NEXT_PUBLIC_API_URL=<wherever the browser can reach the
# backend>` -- typically an Ingress hostname, which this MVP does not include
# yet (see k8s/README.md). Rebuild-and-redeploy the image any time that URL
# changes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osw-frontend
  labels:
    app: osw-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: osw-frontend
  template:
    metadata:
      labels:
        app: osw-frontend
    spec:
      containers:
        - name: frontend
          # Placeholder image ref -- build `frontend/Dockerfile` with the
          # correct `NEXT_PUBLIC_API_URL` build-arg baked in, push it to your
          # registry, and point this at the real `repo/osw-frontend:tag`.
          image: osw-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            # Runtime-only settings the standalone `server.js` reads directly
            # (unlike `NEXT_PUBLIC_API_URL` above, these are NOT baked into
            # the client bundle -- see `frontend/Dockerfile`'s `runner` stage,
            # which sets the same two as image-level defaults).
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          # Deliberately no `resources:` block yet -- see k8s/README.md's
          # scope boundary. Tune this before running in a real cluster.

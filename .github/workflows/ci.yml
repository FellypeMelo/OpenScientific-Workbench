name: OSW Core CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -e . --group dev

      - name: Run backend tests with coverage
        run: |
          cd backend
          pytest --cov=src --cov-report=term-missing --cov-fail-under=80

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # pnpm 11.5.0 (pinned below) requires Node >=22.13 -- it imports the
          # `node:sqlite` builtin at startup, which doesn't exist before that
          # version. Verified by an actual `docker build` under node:20-alpine
          # failing with `ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite` (see
          # frontend/Dockerfile's comment) -- this runner needs the same bump.
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "11.5.0"

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          pnpm exec vitest run --coverage

name: OSW Comprehensive E2E Testing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-matrix:
    name: E2E Integration and Browser Testing
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: osw_session_db
          POSTGRES_USER: osw_user
          POSTGRES_PASSWORD: osw_password_secure_123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.9.1
        ports:
          - 6333:6333
          - 6334:6334

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          cd backend
          uv pip install -r pyproject.toml --system

      - name: Start FastAPI Backend in Background
        env:
          DATABASE_URL: postgresql+asyncpg://osw_user:osw_password_secure_123@localhost:5432/osw_session_db
          QDRANT_HOST: localhost
          REDIS_HOST: localhost
          # BYOK configurations (Fallback mocks for CI execution)
          DEEPSEEK_API_KEY: ${{ secrets.CI_DEEPSEEK_API_KEY || 'mock-deepseek-key' }}
          ZHIPU_GLM_API_KEY: ${{ secrets.CI_ZHIPU_GLM_API_KEY || 'mock-glm-key' }}
          ANTHROPIC_API_KEY: ${{ secrets.CI_ANTHROPIC_API_KEY || 'mock-anthropic-key' }}
          OPENAI_API_KEY: ${{ secrets.CI_OPENAI_API_KEY || 'mock-openai-key' }}
        run: |
          cd backend
          python -m uvicorn src.presentation.main:app --host 127.0.0.1 --port 8000 &
          echo "Waiting for backend to spin up..."
          sleep 5

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "11.5.0"

      - name: Configure pnpm and Install frontend dependencies
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile

      - name: Install Playwright Browsers
        run: |
          cd frontend
          pnpm exec playwright install --with-deps

      - name: Start Next.js Frontend in Background
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
        run: |
          cd frontend
          pnpm run build
          pnpm run start &
          echo "Waiting for Next.js to start..."
          sleep 5

      - name: Run Playwright E2E Tests
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
        run: |
          cd frontend
          pnpm exec playwright test

      - name: Upload E2E Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

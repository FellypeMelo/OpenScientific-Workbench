# MOVED -- this file's services (the full stack: postgres/redis/neo4j/qdrant
# + backend + frontend, reading every secret from `.env`) have been folded
# into the repo root's `docker-compose.yml`, the one canonical Compose stack
# for this project now (see that file's header comment for the full
# rationale and service list -- it also adds a `worker` service and an
# optional `vault` service behind the `advanced` Compose profile, neither of
# which existed in this file).
#
# This file is intentionally left as a non-functional pointer (no
# `services:` key -- `docker compose -f docker-compose.prod.yml up` will now
# error, on purpose, rather than silently run a stale duplicate config) so
# anyone with old muscle-memory / scripts referencing this exact filename
# lands here and finds out where things went instead of a bare "no such
# file" error.
#
# What to run instead:
#
#   cp .env.example .env   # then edit the passwords/secrets in it
#   docker compose up --build
#
# Note the behavior change: unlike this file's old `${VAR:?error message}`
# required-secret pattern, `docker-compose.yml` ships working (but weak)
# local-dev defaults for every credential so a fresh `docker compose up`
# always boots -- see that file's header comment and the root
# `.env.example` for what to override before running this anywhere other
# than your own trusted single local machine.

# Non-secret configuration for the `osw-backend` Deployment (see
# `backend-deployment.yaml`, which consumes this via `envFrom.configMapRef`).
# Every key here maps 1:1 onto a field of `backend/src/infrastructure/config.py`'s
# `Settings` model -- see that module's docstrings for what each one controls.
#
# Placeholders below (`qdrant`, `neo4j`, the CORS origin) assume in-cluster
# `Service`s of those names already exist in this namespace, or that
# `CORS_ALLOWED_ORIGINS`/`NEO4J_URI`/`QDRANT_HOST` have been pointed at
# wherever your Postgres/Neo4j/Redis/Qdrant actually run. This k8s MVP
# deliberately does NOT include manifests for those datastores themselves
# (see `k8s/README.md` for the full list of what's out of scope) -- adjust
# these values to match your actual topology (managed cloud services, a
# separate StatefulSet set you add later, or the same containers
# `docker-compose.prod.yml` runs, re-hosted in-cluster).
apiVersion: v1
kind: ConfigMap
metadata:
  name: osw-backend-config
  labels:
    app: osw-backend
data:
  ENV: "production"

  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"

  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"

  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "30"

  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW_SECONDS: "60"

  # Must match the origin the browser actually loads the frontend from (e.g.
  # your Ingress hostname, once one exists -- see k8s/README.md). Comma-separated
  # if more than one origin needs access.
  CORS_ALLOWED_ORIGINS: "https://app.example.com"

  VAULT_ADDR: "http://vault:8200"
  VAULT_SSH_ROLE: "hpc-ssh-role"
